<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2C1E1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Carta — Socolá</title>
      <link rel="stylesheet" href="/css/app.css">
</head>
<body class="page-carta-tpv">
  <div id="soco-app">
    <div class="sc-hero">
      <a href="/" class="sc-back-btn" aria-label="Volver al inicio">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <img src="/themes/socola/assets/hero.png" alt="Socolá">
      <div class="sc-hero-title">Socolá</div>
      <div class="sc-hero-sub">Especialidad &amp; Repostería</div>
    </div>

    <div class="sc-cat-nav" id="cat-nav"></div>
    <div class="sc-menu" id="menu-list"></div>

    <div class="sc-overlay" id="overlay" onclick="closeChat()"></div>

    <!-- Chat / AI panel -->
    <div class="sc-chat" id="chat-panel">
      <div class="sc-chat-hd">
        <span class="sc-chat-nm">
          <span class="sc-chat-dot"></span>Maître Socolá
        </span>
        <button class="sc-chat-close" onclick="closeChat()">Cerrar</button>
      </div>
      <div class="sc-msgs" id="msg-area"></div>
    </div>

    <!-- Cart / order list -->
    <div class="sc-list-view" id="cart-view">
      <div class="sc-list-hd">
        <h2>Mi Pedido</h2>
        <button class="sc-chat-close" onclick="closeCart()">Cerrar</button>
      </div>
      <div class="sc-list-body" id="cart-items-list"></div>
      <div class="sc-list-total">
        <span>Total</span>
        <span id="cart-total-val">0,00 €</span>
      </div>
    </div>

    <!-- Edit item modal -->
    <div class="sc-edit-modal" id="edit-modal">
      <div class="edit-card">
        <h4>Editar Producto</h4>
        <p id="edit-prod-name"></p>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeEditQty(-1)">-</button>
          <span class="qty-val" id="edit-qty-val">1</span>
          <button class="qty-btn" onclick="changeEditQty(1)">+</button>
        </div>
        <textarea id="edit-obs" placeholder="Observaciones (ej: leche de avena, sin azúcar...)"></textarea>
        <div class="btn-row">
          <button class="btn-del" onclick="removeFromCart()">Eliminar</button>
          <button class="btn-save" onclick="saveEdit()">Guardar</button>
        </div>
      </div>
    </div>

    <!-- Bottom dock -->
    <div class="sc-dock">
      <div class="sc-dock-top" id="sc-dock-top">
        <div id="main-service-btns" style="display:flex;gap:8px;"></div>
        <button id="cart-btn" class="cart-btn-dock" onclick="openCart()">Mi lista</button>
      </div>
      <div class="sc-dock-inner">
        <input type="text" id="chat-input" class="sc-input" placeholder="¿Qué me recomienda hoy?">
        <button class="sc-send" onclick="sendMsg()" aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="/js/socola-carta.js"></script>
</body>
</html>
