  <script>
    // Suprimir errores de extensiones de navegador
    window.addEventListener('error', function (e) {
      if (e.message && (
        e.message.includes('message channel closed') ||
        e.message.includes('Permissions policy violation') ||
        e.message.includes('compute-pressure')
      )) {
        e.stopImmediatePropagation();
        e.preventDefault();
        return true;
      }
    });

    // Suprimir errores no capturados de promesas (extensiones)
    window.addEventListener('unhandledrejection', function (e) {
      if (e.reason && e.reason.message && (
        e.reason.message.includes('message channel closed') ||
        e.reason.message.includes('Permissions policy violation')
      )) {
        e.stopImmediatePropagation();
        e.preventDefault();
        return true;
      }
    });

    // Suprimir logs de Content Scripts de extensiones
    const originalConsoleLog = console.log;
    console.log = function () {
      const message = arguments[0];
      if (typeof message === 'string' && (
        message.includes('Content Script:') ||
        message.includes('Initializing')
      )) {
        return;
      }
      originalConsoleLog.apply(console, arguments);
    };

    // Suprimir warnings de violaciones de políticas
    const originalConsoleWarn = console.warn;
    console.warn = function () {
      const message = arguments[0];
      if (typeof message === 'string' && (
        message.includes('Permissions policy violation') ||
        message.includes('compute-pressure')
      )) {
        return;
      }
      originalConsoleWarn.apply(console, arguments);
    };
  </script>
